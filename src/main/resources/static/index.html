<script>
  (function(){
    const PIN = '20526';
    const SECRET_KEY = 'RC_SECRET_APRIL_2026';
    const adminIcon = document.getElementById('adminGateIcon');
    if (!adminIcon) return;
    adminIcon.addEventListener('click', function(e) {
      // subtle gate: prompt for PIN; no visible failure message if wrong
      const input = prompt('Enter System PIN');
      if (input === PIN) {
        try {
          localStorage.setItem('X-Admin-Secret', SECRET_KEY);
        } catch (err) { /* ignore localStorage errors */ }
        // redirect to admin control path
        window.location.href = '/royal-classico/admin-control-system-april202650';
      } else {
        // intentionally no alert; keep gate hidden
        return;
      }
    });
  })();
</script>
