<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Shield outer border -->
  <path d="M100 8 L188 38 L188 120 C188 172 148 210 100 232 C52 210 12 172 12 120 L12 38 Z"
        fill="#001a3a" stroke="#C5A065" stroke-width="4"/>
  <!-- Shield inner fill -->
  <path d="M100 18 L178 44 L178 120 C178 166 142 202 100 222 C58 202 22 166 22 120 L22 44 Z"
        fill="#003366"/>
  <!-- Inner gold accent border -->
  <path d="M100 26 L170 50 L170 120 C170 162 136 196 100 214 C64 196 30 162 30 120 L30 50 Z"
        fill="none" stroke="#C5A065" stroke-width="1.5" stroke-dasharray="0"/>

  <!-- Crown at top -->
  <g fill="#C5A065">
    <rect x="72" y="46" width="56" height="6" rx="1"/>
    <rect x="76" y="38" width="6" height="12" rx="2"/>
    <rect x="97" y="34" width="6" height="16" rx="2"/>
    <rect x="118" y="38" width="6" height="12" rx="2"/>
    <!-- Crown balls -->
    <circle cx="79" cy="37" r="3"/>
    <circle cx="100" cy="33" r="3.5"/>
    <circle cx="121" cy="37" r="3"/>
  </g>

  <!-- Lion body (stylised heraldic lion rampant) -->
  <g fill="#C5A065">
    <!-- Body -->
    <ellipse cx="100" cy="130" rx="22" ry="30"/>
    <!-- Head -->
    <circle cx="100" cy="94" r="16"/>
    <!-- Mane detail -->
    <circle cx="100" cy="94" r="20" fill="none" stroke="#C5A065" stroke-width="5" stroke-dasharray="4 2"/>
    <!-- Left front paw (raised) -->
    <ellipse cx="76" cy="108" rx="8" ry="6" transform="rotate(-30 76 108)"/>
    <circle cx="70" cy="103" r="5"/>
    <!-- Right front paw (raised) -->
    <ellipse cx="124" cy="108" rx="8" ry="6" transform="rotate(30 124 108)"/>
    <circle cx="130" cy="103" r="5"/>
    <!-- Left back leg -->
    <ellipse cx="82" cy="155" rx="7" ry="10"/>
    <!-- Right back leg -->
    <ellipse cx="118" cy="155" rx="7" ry="10"/>
    <!-- Tail -->
    <path d="M122 140 Q148 120 144 98 Q140 82 132 86" stroke="#C5A065" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="130" cy="84" r="5"/>
  </g>

  <!-- Lion face details -->
  <g fill="#001a3a">
    <circle cx="94" cy="91" r="3"/>
    <circle cx="106" cy="91" r="3"/>
    <path d="M96 98 Q100 102 104 98" stroke="#001a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Divider line -->
  <line x1="42" y1="175" x2="158" y2="175" stroke="#C5A065" stroke-width="1.5"/>

  <!-- EST. 2026 text -->
  <text x="100" y="192" text-anchor="middle" fill="#C5A065"
        font-family="Georgia, serif" font-size="11" font-weight="bold" letter-spacing="3">EST. 2026</text>

  <!-- ROYAL CLASSICO text top -->
  <text x="100" y="73" text-anchor="middle" fill="#E8D1A3"
        font-family="Georgia, serif" font-size="8.5" font-weight="bold" letter-spacing="2.5">ROYAL CLASSICO</text>
</svg>
